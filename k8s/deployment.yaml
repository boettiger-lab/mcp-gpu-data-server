apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-mcp
spec:
  replicas: 1
  strategy:
    type: Recreate   # GPU nodes have 1 GPU; rolling update deadlocks
  selector:
    matchLabels:
      app: gpu-mcp
  template:
    metadata:
      labels:
        app: gpu-mcp
    spec:
      tolerations:
        - key: "nautilus.io/issue"
          value: "1568"
          operator: Equal
          effect: NoSchedule
      nodeSelector:
        kubernetes.io/hostname: stratus1.nrp-espm.berkeley.edu
      containers:
      - name: server
        image: ghcr.io/boettiger-lab/mcp-gpu-data-server:main
        env:
        - name: STAC_CATALOG_URL
          value: "https://s3-west.nrp-nautilus.io/public-data/stac/catalog.json"
        - name: QUERY_ENGINE
          value: "gpu-cudf"
        # Polars thread pool — sweet spot at 64 threads (S3 throughput scales
        # with threads but end-to-end degrades >64t due to memory pressure
        # in 885M-row joins). gpu-cudf (kvikio) beats gpu (scan_parquet) even
        # at 64t: 31.7s vs 53.7s — GPU SQL prefers eager materialization.
        - name: POLARS_MAX_THREADS
          value: "64"
        # kvikio thread pool — parallel chunked HTTP range requests per file.
        - name: KVIKIO_NTHREADS
          value: "64"
        - name: KVIKIO_TASK_SIZE
          value: "16777216"
        resources:
          requests:
            memory: 32Gi
            cpu: 8
            nvidia.com/gpu: 1
          limits:
            memory: 120Gi
            cpu: 16
            nvidia.com/gpu: 1
        ports:
        - containerPort: 8000
        readinessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 5
