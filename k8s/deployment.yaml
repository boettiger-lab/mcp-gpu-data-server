apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-mcp
spec:
  replicas: 0
  strategy:
    type: Recreate   # GPU nodes have 1 GPU; rolling update deadlocks
  selector:
    matchLabels:
      app: gpu-mcp
  template:
    metadata:
      labels:
        app: gpu-mcp
    spec:
      tolerations:
        - key: "nautilus.io/issue"
          value: "1568"
          operator: Equal
          effect: NoSchedule
      nodeSelector:
        kubernetes.io/hostname: stratus1.nrp-espm.berkeley.edu
      containers:
      - name: server
        image: ghcr.io/boettiger-lab/mcp-gpu-data-server:main
        env:
        - name: STAC_CATALOG_URL
          value: "https://s3-west.nrp-nautilus.io/public-data/stac/catalog.json"
        - name: QUERY_ENGINE
          value: "gpu"
        # Polars thread pool — controls parallel S3 downloads across files.
        # Default is os.cpu_count() capped at 16; on a 128-CPU node this
        # leaves most bandwidth unused. 256 threads achieves ~3.8 Gbps vs
        # 0.62 Gbps at 16 threads on NRP 100G IB (61 files, 4.1 GiB test).
        - name: POLARS_MAX_THREADS
          value: "256"
        # kvikio thread pool (gpu-cudf mode only — not used in gpu mode)
        - name: KVIKIO_NTHREADS
          value: "64"
        - name: KVIKIO_TASK_SIZE
          value: "16777216"
        resources:
          requests:
            memory: 32Gi
            cpu: 8
            nvidia.com/gpu: 1
          limits:
            memory: 120Gi
            cpu: 16
            nvidia.com/gpu: 1
        ports:
        - containerPort: 8000
        readinessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 5
