apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-mcp
spec:
  replicas: 1
  strategy:
    type: Recreate   # GPU nodes have 1 GPU; rolling update deadlocks
  selector:
    matchLabels:
      app: gpu-mcp
  template:
    metadata:
      labels:
        app: gpu-mcp
    spec:
      tolerations:
        - key: "nautilus.io/issue"
          value: "1568"
          operator: Equal
          effect: NoSchedule
      nodeSelector:
        kubernetes.io/hostname: stratus1.nrp-espm.berkeley.edu
      containers:
      - name: server
        image: ghcr.io/boettiger-lab/mcp-gpu-data-server:kvikio-gpu-direct
        env:
        - name: STAC_CATALOG_URL
          value: "https://s3-west.nrp-nautilus.io/public-data/stac/catalog.json"
        - name: QUERY_ENGINE
          value: "gpu-cudf"
        # kvikio thread pool — set_num_threads() Python API is broken in 25.02;
        # env vars are the only reliable way to configure at library init time.
        # 64 threads + 16 MiB chunks achieves ~6 Gbps on NRP 100G IB for large files.
        - name: KVIKIO_NTHREADS
          value: "64"
        - name: KVIKIO_TASK_SIZE
          value: "16777216"
        resources:
          requests:
            memory: 32Gi
            cpu: 1
            nvidia.com/gpu: 1
          limits:
            memory: 120Gi
            cpu: 16
            nvidia.com/gpu: 1
        ports:
        - containerPort: 8000
        readinessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 5
